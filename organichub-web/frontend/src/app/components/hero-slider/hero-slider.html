<section class="hero-slider">

  <!-- LEFT ARROW -->
  <button class="nav prev" (click)="prev()">‹</button>

  <!-- SLIDER VIEWPORT -->
  <div class="slider-viewport">

    <!-- SLIDER TRACK -->
    <div
      class="slider-track"
      [class.no-transition]="isResetting"
      [style.transform]="'translateX(-' + activeIndex * 100 + '%)'"
    >

      <!-- REAL SLIDES -->
      <div class="slide" *ngFor="let slide of slides">
        <div class="slide-content">

          <!-- TEXT -->
          <div class="slide-text">
            <h1>{{ slide.title }}</h1>

            <p class="tagline">{{ slide.tagline }}</p>
            <p class="motto">Purity Over Compromise</p>
            <div class="trust-boxes">
              <div class="trust-box"><span>100%</span><small>Organic</small></div>
              <div class="trust-box"><span>100%</span><small>Pure</small></div>
              <div class="trust-box"><span>100%</span><small>Trusted</small></div>
            </div>
            <button class="cta-btn" routerLink="/products">
              Browse Products
            </button>


          </div>

          <!-- IMAGE -->
          <div class="slide-image">
            <img class="product-image" [src]="slide.image" alt="" />
          </div>

        </div>
      </div>

      <!-- CLONE OF FIRST SLIDE (IMPORTANT) -->
      <div class="slide">
        <div class="slide-content">

          <div class="slide-text">
            <h1>{{ slides[0].title }}</h1>
            <p class="tagline">{{ slides[0].tagline }}</p>

            <div class="trust-boxes">
              <div class="trust-box"><span>100%</span><small>Organic</small></div>
              <div class="trust-box"><span>100%</span><small>Pure</small></div>
              <div class="trust-box"><span>100%</span><small>Trusted</small></div>
            </div>

            <p class="motto">Purity Over Compromise</p>
            <button class="cta-btn" routerLink="/products">
              Browse Products
            </button>



          </div>

          <div class="slide-image">
            <img class="product-image" [src]="slides[0].image" alt="" />
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT ARROW -->
  <button class="nav next" (click)="next()">›</button>

  <!-- PROGRESS -->
  <div class="progress-bar">
    <span
      [class.no-transition]="progress === 0"
      [style.width.%]="progress">
    </span>
  </div>

</section>
