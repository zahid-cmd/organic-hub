<header class="site-header">

  <!-- LEFT -->
  <div class="header-left">
    <img
      src="assets/header_logo.png"
      alt="Organic Hub Logo"
      class="brand-logo"
    />

    <span class="brand-name">
      <span class="brand-organic">Organic</span>
      <span class="brand-hub">Hub</span>
    </span>
  </div>


  <!-- CENTER NAV -->
  <nav class="header-nav">

    <a
      routerLink="/"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }">
      Home
    </a>

    <a
      routerLink="/products"
      routerLinkActive="active">
      Products
    </a>

    <a
      routerLink="/contact"
      routerLinkActive="active">
      Contact
    </a>

    <!-- ERP LOGIN BUTTON -->
<button
  #erpBtn
  type="button"
  class="official-login"
  (click)="goToErp(erpBtn)">

  <span class="btn-text">Official Login</span>
  <span class="btn-loader"></span>

</button>

  </nav>


  <!-- RIGHT -->
  <div class="header-right">

    <button
      type="button"
      class="cart-btn"
      aria-label="Toggle cart"
      (click)="toggleCart()">

      <span class="cart-icon-wrapper">

        <svg
          class="cart-icon"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path d="M7 18c-1.1 0-2 .9-2 2s.9 2 
                  2 2 2-.9 2-2-.9-2-2-2zm10 
                  0c-1.1 0-2 .9-2 2s.9 2 2 
                  2 2-.9 2-2-.9-2-2-2zM7.16 
                  14h9.45c.75 0 1.41-.41 
                  1.75-1.03l3.58-6.49a1 
                  1 0 0 0-.87-1.48H6.21L5.27 
                  2H2v2h2l3.6 7.59-1.35 
                  2.44C5.52 14.37 6.48 
                  16 8 16h12v-2H8l1.16-2z"/>
        </svg>

        <span
          class="cart-badge"
          *ngIf="totalQty > 0">
          {{ totalQty }}
        </span>

      </span>

    </button>

  </div>

</header>
