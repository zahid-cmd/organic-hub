<!-- =========================
     PRODUCTS OVERLAY
========================= -->

<div
  class="products-overlay"
  [class.closing]="isClosing"
  (click)="closeProducts()">

  <section
    class="products-panel"
    (click)="$event.stopPropagation()">

    <!-- =========================
         HEADER
    ========================= -->
    <div class="products-top-box">

      <!-- BACK BUTTON -->
      <button
        type="button"
        class="back-btn"
        (click)="goBackToCategories()">
        ← Back
      </button>

      <!-- TITLE -->
      <div class="products-heading">
        <h1>Our Organic Products</h1>
        <p>Pure. Natural. Responsibly sourced.</p>
      </div>

      <!-- FILTERS -->
      <div class="products-filters">

        <input
          type="text"
          class="search-input"
          placeholder="Search products..."
          [(ngModel)]="searchTerm" />

        <select
          class="category-select"
          [(ngModel)]="selectedCategory">

          <option
            *ngFor="let cat of categories"
            [value]="cat">
            {{ cat }}
          </option>

        </select>

        <button
          type="button"
          class="clear-filter-btn"
          (click)="clearFilters()">
          Clear
        </button>

      </div>

    </div>

    <!-- =========================
         BODY
    ========================= -->
    <div class="products-body">

      <!-- LOADING STATE -->
      <div *ngIf="isLoading" class="loading-state">
        <p>Loading products...</p>
      </div>

      <!-- PRODUCT GRID -->
      <div
        class="products-grid"
        *ngIf="!isLoading && filteredProducts.length > 0">

        <div
          class="product-card"
          *ngFor="let product of filteredProducts">

          <!-- IMAGE -->
          <div class="product-image">
            <img
              [src]="product.primaryImageUrl 
                      ? 'http://localhost:5150/' + product.primaryImageUrl 
                      : 'assets/products/placeholder.png'"
              [alt]="product.productName"
              loading="lazy" />
          </div>

          <!-- NAME -->
          <h3 class="product-name">
            {{ product.productName }}
          </h3>

          <!-- CATEGORY / SUBCATEGORY -->
          <p class="product-pack">
            {{ product.categoryName }} /
            {{ product.subCategoryName }}
          </p>

          <!-- PRICE -->
          <p class="product-price">
            ৳ {{ product.salePrice || 0 }}
          </p>

          <!-- ADD TO CART -->
          <button
            type="button"
            class="add-btn"
            (click)="addToCart(product)">
            Add to Cart
          </button>

        </div>

      </div>

      <!-- EMPTY STATE -->
      <div
        class="no-products"
        *ngIf="!isLoading && filteredProducts.length === 0">

        <h3>No products found</h3>
        <p>Try adjusting your search or category filter.</p>

      </div>

    </div>

  </section>

</div>
