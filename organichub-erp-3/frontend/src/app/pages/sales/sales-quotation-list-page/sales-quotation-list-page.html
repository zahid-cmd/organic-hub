<div class="page-body">

  <!-- PAGE SUB HEADER -->
  <app-page-sub-header title="Search & Filter Sales Quotations">
    <div page-actions class="subheader-actions">
      <button class="ch-btn" (click)="onAdd()">Add</button>
      <button class="ch-btn" (click)="onClear()">Clear</button>
      <button class="ch-btn" (click)="onBack()">Back</button>
    </div>
  </app-page-sub-header>

  <div class="page-body-content">

    <!-- SEARCH AREA -->
    <app-search-area
      [searchText]="searchText"
      [status]="statusFilter"
      [statusOptions]="statusOptions"
      (searchChange)="onSearch($event)"
      (statusChange)="onStatusChange($event)">
    </app-search-area>

    <!-- LIST -->
    <div class="ch-list-body">
      <div class="ch-list-table">

        <!-- HEADER -->
        <div class="ch-list-row ch-list-header">
          <div class="col col-sl">#</div>
          <div class="col">Quotation No</div>
          <div class="col">Quotation Date</div>
          <div class="col">Customer Name</div>
          <div class="col">Total Amount</div>
          <div class="col">Status</div>
          <div class="col col-actions">Actions</div>
        </div>

        <!-- BODY ROWS (SCROLL CONTROLLED HERE ONLY) -->
        <div
          class="ch-list-body-rows"
          [class.scrollable]="pageSize > 10">

          <div
            class="ch-list-row"
            *ngFor="let quotation of pagedOrders; let i = index">

            <div class="col col-sl">{{ serial(i) }}</div>
            <div class="col">{{ quotation.orderNo }}</div>
            <div class="col">{{ quotation.orderDate }}</div>
            <div class="col">{{ quotation.customerName }}</div>
            <div class="col amount">{{ quotation.totalAmount }}</div>
            <div class="col status">{{ quotation.status }}</div>

            <div class="col col-actions action-icons">

              <!-- QUOTATION PRINT -->
              <button
                class="icon-btn print"
                title="View Quotation"
                (click)="onQuotationPrint(i)">
                <i class="fa fa-file-invoice"></i>
              </button>

              <!-- VIEW -->
              <button class="icon-btn view" title="View">
                <i class="fa fa-eye"></i>
              </button>

              <!-- EDIT -->
              <button class="icon-btn edit" title="Edit">
                <i class="fa fa-pen"></i>
              </button>

            </div>


          </div>

        </div>

      </div>
    </div>

    <!-- PAGINATION (ALWAYS VISIBLE) -->
    <div class="ch-pagination">
      <app-pagination
        [totalRecords]="totalRecords"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
      </app-pagination>
    </div>

  </div>
</div>
