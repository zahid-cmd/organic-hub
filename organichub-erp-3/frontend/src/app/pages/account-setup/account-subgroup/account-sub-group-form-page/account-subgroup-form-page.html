<div class="page-body">

  <app-organic-toast></app-organic-toast>

  <app-page-sub-header title="Create / Update Account Sub-Group">
    <div page-actions class="subheader-actions">

      <button
        type="button"
        class="ch-btn"
        *ngIf="!isViewMode"
        (click)="onSave()">
        {{ mode === 'edit' ? 'Update' : 'Save' }}
      </button>

      <button
        type="button"
        class="ch-btn"
        *ngIf="!isViewMode"
        (click)="onClear()">
        Clear
      </button>

      <button
        type="button"
        class="ch-btn"
        (click)="onBack()">
        Back
      </button>

    </div>
  </app-page-sub-header>

  <div class="page-body-content">
    <div class="form-body">

      <!-- COLUMN 1 -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">

            <div class="section-header">Parent Group</div>

            <div class="form-field">
              <label>Account Group</label>

              <select
                [(ngModel)]="subGroup.groupId"
                (ngModelChange)="onGroupChange($event)"
                [disabled]="isViewMode">

                <option [ngValue]="null" disabled>
                  Select Account Group
                </option>

                <option
                  *ngFor="let g of accountGroups"
                  [ngValue]="g.id">
                  {{ g.groupCode }} - {{ g.groupName }}
                </option>

              </select>
            </div>

            <div class="form-field">
              <label>Status</label>
              <select
                [(ngModel)]="subGroup.status"
                [disabled]="isViewMode">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- COLUMN 2 -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">

            <div class="section-header">Sub-Group Information</div>

            <div class="form-field">
              <label>Sub-Group Code</label>
              <input
                type="text"
                [(ngModel)]="subGroup.subGroupCode"
                readonly>
            </div>

            <div class="form-field">
              <label>Sub-Group Name</label>
              <input
                type="text"
                [(ngModel)]="subGroup.subGroupName"
                [disabled]="isViewMode">
            </div>

            <div class="form-field">
              <label>Remarks</label>
              <textarea
                [(ngModel)]="subGroup.remarks"
                [disabled]="isViewMode">
              </textarea>
            </div>

          </div>
        </div>
      </div>

      <!-- COLUMN 3 -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">

            <div class="section-header">Created Information</div>

            <div class="form-field">
              <label>Created By</label>
              <input type="text"
                     [(ngModel)]="subGroup.createdBy"
                     readonly>
            </div>

            <div class="form-field">
              <label>Created Date</label>
              <input type="text"
                     [(ngModel)]="subGroup.createdDate"
                     readonly>
            </div>

          </div>
        </div>
      </div>

      <!-- COLUMN 4 -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">

            <div class="section-header">Updated Information</div>

            <div class="form-field">
              <label>Updated By</label>
              <input type="text"
                     [(ngModel)]="subGroup.updatedBy"
                     readonly>
            </div>

            <div class="form-field">
              <label>Updated Date</label>
              <input type="text"
                     [(ngModel)]="subGroup.updatedDate"
                     readonly>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>
