<div class="page-container">

  <app-organic-toast></app-organic-toast>

  <div class="page-body">

    <!-- SUB HEADER -->
    <app-page-sub-header title="Search & Filter Card Charges">
      <div page-actions class="subheader-actions">
        <button class="ch-btn" (click)="onAdd()">Add</button>
        <button class="ch-btn" (click)="onClear()">Clear</button>
        <button class="ch-btn" (click)="onBack()">Back</button>
      </div>
    </app-page-sub-header>

    <div class="page-body-content">

      <!-- LOADING -->
      <div class="ch-loading" *ngIf="loading">
        <i class="fa fa-spinner fa-spin"></i>
        Loading card charges...
      </div>

      <!-- ERROR -->
      <div class="ch-error" *ngIf="!loading && error">
        {{ error }}
      </div>

      <ng-container *ngIf="!loading && !error">

        <!-- SEARCH -->
        <app-search-area
          [searchText]="searchText"
          [status]="statusFilter"
          [statusOptions]="statusOptions"
          (searchChange)="onSearch($event)"
          (statusChange)="onStatusChange($event)">
        </app-search-area>

        <!-- LIST -->
        <div class="ch-list-body"
             *ngIf="pagedCharges.length > 0; else emptyState">

          <div class="ch-list-table">

            <!-- HEADER -->
            <div class="ch-list-row ch-list-header">

              <div class="col col-sl">#</div>

              <div class="col sortable"
                   (click)="onSort('posLedger')">
                POS Ledger
              </div>

              <div class="col sortable"
                   (click)="onSort('cardName')">
                Card Name
              </div>

              <div class="col sortable"
                   (click)="onSort('chargePercent')">
                Charges (%)
              </div>

              <div class="col sortable"
                   (click)="onSort('status')">
                Status
              </div>

              <div class="col col-actions">
                Actions
              </div>

            </div>

            <!-- BODY -->
            <div class="ch-list-body-rows">

              <div class="ch-list-row"
                   *ngFor="let row of pagedCharges; let i = index">

                <div class="col col-sl">
                  {{ serial(i) }}
                </div>

                <div class="col">
                  {{ row.posLedger }}
                </div>

                <div class="col">
                  {{ row.cardName }}
                </div>

                <div class="col">
                  {{ row.chargePercent }}
                </div>

                <div class="col">
                  <span class="status-badge"
                        [class.active]="row.status === 'Active'"
                        [class.inactive]="row.status === 'Inactive'">
                    {{ row.status }}
                  </span>
                </div>

                <div class="col col-actions action-icons">

                  <button class="icon-btn view"
                          (click)="onView(row)">
                    <i class="fa fa-eye"></i>
                  </button>

                  <button class="icon-btn edit"
                          (click)="onEdit(row)">
                    <i class="fa fa-pen"></i>
                  </button>

                  <button class="icon-btn delete"
                          (click)="onDelete(row)">
                    <i class="fa fa-trash"></i>
                  </button>

                </div>

              </div>

            </div>

          </div>
        </div>

        <!-- EMPTY STATE -->
        <ng-template #emptyState>
          <div class="ch-empty-state">
            <i class="fa fa-credit-card empty-icon"></i>
            <div class="empty-title">
              No Card Charges Found
            </div>
            <div class="empty-sub">
              Try adjusting search or filters.
            </div>
          </div>
        </ng-template>

        <!-- PAGINATION -->
        <div *ngIf="totalRecords > 0">
          <app-pagination
            [totalRecords]="totalRecords"
            [pageSize]="pageSize"
            [currentPage]="currentPage"
            (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
          </app-pagination>
        </div>

      </ng-container>

    </div>
  </div>
</div>
