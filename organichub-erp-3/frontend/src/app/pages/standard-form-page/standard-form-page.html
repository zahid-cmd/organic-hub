<!-- =====================================================
     PAGE BODY
===================================================== -->
<div class="page-body">

  <!-- =====================================================
       PAGE BODY HEADER
  ===================================================== -->
  <app-page-sub-header title="Create / Update Record">
    <div page-actions class="subheader-actions">

      <!-- SAVE (HIDDEN IN VIEW MODE) -->
      <button
        class="ch-btn"
        *ngIf="!isViewMode">
        Save
      </button>

      <!-- CLEAR (HIDDEN IN VIEW MODE) -->
      <button
        class="ch-btn"
        *ngIf="!isViewMode"
        (click)="onClear()">
        Clear
      </button>

      <!-- BACK (ALWAYS VISIBLE) -->
      <button
        class="ch-btn"
        (click)="onBack()">
        Back
      </button>

    </div>
  </app-page-sub-header>

  <!-- =====================================================
       PAGE BODY CONTENT
  ===================================================== -->
  <div class="page-body-content">

    <div class="form-body">

            <div class="section-header">Section 1</div>

              <label>Field 1.1</label>

              <label>Field 1.2</label>

            <div class="form-field">

            </div>
          </div>
        </div>
      </div>
