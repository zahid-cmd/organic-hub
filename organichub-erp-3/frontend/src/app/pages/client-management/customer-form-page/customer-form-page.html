<div class="page-body">

  <!-- ORGANIC TOAST -->
  <app-organic-toast></app-organic-toast>

  <!-- SUB HEADER -->
  <app-page-sub-header title="Create / Update Customer">
    <div page-actions class="subheader-actions">

      <button
        type="button"
        class="ch-btn"
        *ngIf="!isViewMode"
        (click)="onSave()">
        {{ saveButtonLabel }}
      </button>

      <button
        type="button"
        class="ch-btn"
        *ngIf="!isViewMode"
        (click)="onClear()">
        Clear
      </button>

      <button
        type="button"
        class="ch-btn"
        (click)="onBack()">
        Back
      </button>

    </div>
  </app-page-sub-header>

  <div class="page-body-content">

    <!-- LOADING -->
    <div class="ch-loading" *ngIf="loading">
      <i class="fa fa-spinner fa-spin"></i>
      Loading customer...
    </div>

    <!-- FORM BODY -->
    <div class="form-body" *ngIf="!loading">

      <!-- ================= COLUMN 1 ================= -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">
            <div class="section-header">Parental Control</div>

            <div class="form-field">
              <label>Account Sub Group</label>
              <input type="text"
                     [value]="customer.accountSubGroupName || ''"
                     readonly>
            </div>

            <div class="form-field">
              <label>Sub Group Code</label>
              <input type="text"
                     [value]="customer.subGroupCode || ''"
                     readonly>
            </div>

            <div class="form-field">
              <label>Status</label>
              <select [(ngModel)]="customer.status"
                      [disabled]="isViewMode">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- ================= COLUMN 2 ================= -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">
            <div class="section-header">Customer Information</div>

            <div class="form-field">
              <label>Customer Code</label>
              <input type="text"
                     [value]="customer.customerCode"
                     readonly>
            </div>

            <div class="form-field">
              <label>Customer Display Name</label>
              <input type="text"
                     [value]="customerDisplayName"
                     readonly>
            </div>

            <div class="form-field">
              <label>Name</label>
              <input type="text"
                     [(ngModel)]="customer.customerName"
                     [disabled]="isViewMode">
            </div>

            <div class="form-field">
              <label>Primary Phone</label>
              <input type="text"
                     [(ngModel)]="customer.primaryPhone"
                     [disabled]="isViewMode">
            </div>

          </div>
        </div>
      </div>

      <!-- ================= COLUMN 3 ================= -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">
            <div class="section-header">Contact Information</div>

            <div class="form-field">
              <label>Secondary Phone</label>
              <input type="text"
                     [(ngModel)]="customer.secondaryPhone"
                     [disabled]="isViewMode">
            </div>

            <div class="form-field">
              <label>Email</label>
              <input type="text"
                     [(ngModel)]="customer.email"
                     [disabled]="isViewMode">
            </div>

            <div class="form-field">
              <label>Address</label>
              <input type="text"
                     [(ngModel)]="customer.address"
                     [disabled]="isViewMode">
            </div>

            <div class="form-field">
              <label>Remarks</label>
              <input type="text"
                     [(ngModel)]="customer.remarks"
                     [disabled]="isViewMode">
            </div>

          </div>
        </div>
      </div>

      <!-- ================= COLUMN 4 ================= -->
      <div class="form-col">
        <div class="form-group-box">
          <div class="form-section">
            <div class="section-header">Audit Info</div>

            <div class="form-field">
              <label>Created By</label>
              <input type="text"
                     [value]="customer.createdBy || ''"
                     readonly>
            </div>

            <div class="form-field">
              <label>Created Date</label>
              <input type="text"
                     [value]="customer.createdDate || ''"
                     readonly>
            </div>

            <div class="form-field">
              <label>Updated By</label>
              <input type="text"
                     [value]="customer.updatedBy || ''"
                     readonly>
            </div>

            <div class="form-field">
              <label>Updated Date</label>
              <input type="text"
                     [value]="customer.updatedDate || ''"
                     readonly>
            </div>

          </div>
        </div>
      </div>

    </div>

  </div>
</div>
