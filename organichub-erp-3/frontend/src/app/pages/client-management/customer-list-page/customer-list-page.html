<div class="page-container">

  <app-organic-toast></app-organic-toast>

  <div class="page-body">

    <app-page-sub-header title="Search & Filter Customers">
      <div page-actions class="subheader-actions">
        <button class="ch-btn" (click)="onAdd()">Add</button>
        <button class="ch-btn" (click)="onClear()">Clear</button>
        <button class="ch-btn" (click)="onBack()">Back</button>
      </div>
    </app-page-sub-header>

    <div class="page-body-content">

      <!-- LOADING -->
      <div class="ch-loading" *ngIf="loading">
        <i class="fa fa-spinner fa-spin"></i>
        Loading customers...
      </div>

      <!-- ERROR -->
      <div class="ch-error" *ngIf="!loading && error">
        {{ error }}
      </div>

      <ng-container *ngIf="!loading && !error">

        <app-search-area
          [searchText]="searchText"
          [status]="statusFilter"
          [statusOptions]="['Active','Inactive']"
          (searchChange)="onSearch($event)"
          (statusChange)="onStatusChange($event)">
        </app-search-area>

        <div class="ch-list-body"
             *ngIf="pagedCustomers.length > 0; else emptyState">

          <div class="ch-list-table">

            <div class="ch-list-row ch-list-header">

              <div class="col col-sl">#</div>

              <div class="col sortable"
                   (click)="onSort('customerCode')">
                Customer Code
              </div>

              <div class="col sortable"
                   (click)="onSort('customerName')">
                Customer Name
              </div>

              <div class="col sortable"
                  (click)="onSort('primaryPhone')">
                Primary Phone
              </div>

              <div class="col sortable"
                  (click)="onSort('secondaryPhone')">
                Secondary Phone
              </div>


              <div class="col sortable"
                   (click)="onSort('status')">
                Status
              </div>

              <div class="col col-actions">
                Actions
              </div>

            </div>

            <div class="ch-list-row"
                 *ngFor="let row of pagedCustomers; let i = index">

              <div class="col col-sl">{{ serial(i) }}</div>
              <div class="col">{{ row.customerCode }}</div>
              <div class="col">{{ row.customerName }}</div>
              <div class="col">{{ row.primaryPhone }}</div>
              <div class="col">{{ row.secondaryPhone }}</div>


              <div class="col">
                <span class="status-badge"
                      [class.active]="row.status === 'Active'"
                      [class.inactive]="row.status === 'Inactive'">
                  {{ row.status }}
                </span>
              </div>

              <div class="col col-actions action-icons">

                <button class="icon-btn view"
                        (click)="onView(row)">
                  <i class="fa fa-eye"></i>
                </button>

                <button class="icon-btn edit"
                        (click)="onEdit(row)">
                  <i class="fa fa-pen"></i>
                </button>

                <button class="icon-btn delete"
                        (click)="onDelete(row)">
                  <i class="fa fa-trash"></i>
                </button>

              </div>

            </div>

          </div>
        </div>

        <ng-template #emptyState>
          <div class="ch-empty-state">
            <i class="fa fa-folder-open"></i>
            <div class="empty-title">No Customers Found</div>
            <div class="empty-sub">
              Try adjusting search or filters.
            </div>
          </div>
        </ng-template>

        <div *ngIf="totalRecords > pageSize">
          <app-pagination
            [totalRecords]="totalRecords"
            [pageSize]="pageSize"
            [currentPage]="currentPage"
            (pageChange)="onPageChange($event)"
            (pageSizeChange)="onPageSizeChange($event)">
          </app-pagination>
        </div>

      </ng-container>

    </div>
  </div>
</div>
