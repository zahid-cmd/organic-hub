<div class="page-body">

  <!-- PAGE SUB HEADER -->
  <app-page-sub-header title="Search & Filter Process Costing">
    <div page-actions class="subheader-actions">
      <button class="ch-btn" (click)="onAdd()">Add</button>
      <button class="ch-btn" (click)="onClear()">Clear</button>
      <button class="ch-btn" (click)="onBack()">Back</button>
    </div>
  </app-page-sub-header>

  <div class="page-body-content">

    <!-- SEARCH AREA -->
    <app-search-area
      [searchText]="searchText"
      [status]="statusFilter"
      [statusOptions]="statusOptions"
      (searchChange)="onSearch($event)"
      (statusChange)="onStatusChange($event)">
    </app-search-area>

    <!-- LIST -->
    <div class="ch-list-body">
      <div class="ch-list-table">

        <!-- HEADER -->
        <div class="ch-list-row ch-list-header">
          <div class="col col-sl">#</div>
          <div class="col">Batch No</div>
          <div class="col">Process Date</div>
          <div class="col">Finished Product</div>
          <div class="col amount">Total Cost</div>
          <div class="col">Status</div>
          <div class="col col-actions">Actions</div>
        </div>

        <!-- BODY -->
        <div
          class="ch-list-body-rows"
          [class.scrollable]="pageSize > 10">

          <div
            class="ch-list-row"
            *ngFor="let pc of pagedProcesses; let i = index">

            <div class="col col-sl">{{ serial(i) }}</div>
            <div class="col">{{ pc.batchNo }}</div>
            <div class="col">{{ pc.processDate }}</div>
            <div class="col">{{ pc.finishedProduct }}</div>
            <div class="col amount">{{ pc.totalCost }}</div>
            <div class="col status">{{ pc.status }}</div>

            <div class="col col-actions action-icons">
              <button class="icon-btn view" (click)="onView(i)">
                <i class="fa fa-eye"></i>
              </button>
              <button class="icon-btn edit" (click)="onEdit(i)">
                <i class="fa fa-pen"></i>
              </button>
            </div>

          </div>
        </div>

      </div>
    </div>

    <!-- PAGINATION -->
    <div class="ch-pagination">
      <app-pagination
        [totalRecords]="totalRecords"
        [pageSize]="pageSize"
        [currentPage]="currentPage"
        (pageChange)="onPageChange($event)"
        (pageSizeChange)="onPageSizeChange($event)">
      </app-pagination>
    </div>

  </div>
</div>
