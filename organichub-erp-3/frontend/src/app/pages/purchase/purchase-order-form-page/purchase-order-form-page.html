<div class="page-body">

  <!-- PAGE SUB HEADER -->
  <app-page-sub-header title="Purchase Order">

    <div page-actions class="subheader-actions">

      <button
        type="button"
        class="ch-btn primary"
        (click)="onSave()"
        [disabled]="saving || isViewMode">

        {{ isEditMode ? 'Update' : 'Save' }}

      </button>

      <button
        type="button"
        class="ch-btn"
        (click)="resetOrder()"
        [disabled]="isViewMode">

        Reset

      </button>

      <button
        type="button"
        class="ch-btn"
        (click)="goBack()">

        Back

      </button>

    </div>

  </app-page-sub-header>


  <div class="page-body-content">

    <div class="pi-body">

      <!-- LEFT COLUMN -->
      <div class="pi-col pi-left">

        <!-- ORDER DETAILS -->
        <div class="pi-box">

          <div class="pi-box-title">
            Order Details
          </div>

          <div class="pi-row">

            <div class="pi-field">
              <label>Order Number</label>

              <input
                type="text"
                [(ngModel)]="order.orderNo"
                placeholder="Auto Generated"
                readonly>
            </div>

            <div class="pi-field">
              <label>Order Date</label>

              <input
                type="date"
                [(ngModel)]="order.orderDate"
                [disabled]="isViewMode">
            </div>

          </div>

          <div class="pi-field pi-full">

            <label>Supplier</label>

            <select
              [(ngModel)]="order.supplierId"
              [disabled]="isViewMode">

              <option [ngValue]="0">Select Supplier</option>

              <option
                *ngFor="let s of suppliers"
                [ngValue]="s.id">

                {{ s.supplierName }}

              </option>

            </select>

          </div>

          <div class="pi-field pi-full">

            <label>Status</label>

            <select
              [(ngModel)]="order.status"
              [disabled]="isViewMode || isProcessed">

              <option value="Draft">Draft</option>
              <option value="Approved">Approved</option>
              <option value="Processed">Processed</option>

            </select>

          </div>

        </div>


        <!-- ADD PRODUCT -->
        <div class="pi-box pi-add-product">

          <div class="pi-box-title">
            Add Product
          </div>

          <div class="pi-add-row">

            <select
              [(ngModel)]="entry.productSubCategoryId"
              (change)="entry.productId = 0">

              <option [ngValue]="0">Select Sub Category</option>

              <option
                *ngFor="let sc of productSubCategories"
                [ngValue]="sc.id">

                {{ sc.subCategoryName }}

              </option>

            </select>


            <select [(ngModel)]="entry.productId">

              <option [ngValue]="0">Select Product</option>

              <option
                *ngFor="let p of filteredProducts"
                [ngValue]="p.id">

                {{ p.productName }}

              </option>

            </select>


            <div class="pi-qty-rate-row">

              <input
                type="number"
                placeholder="Qty"
                [(ngModel)]="entry.quantity"
                [disabled]="isViewMode">

              <input
                type="number"
                placeholder="Rate"
                [(ngModel)]="entry.rate"
                [disabled]="isViewMode">

            </div>


            <div class="pi-amount-stock-row">

              <input
                type="text"
                placeholder="Amount"
                [value]="calculatedAmount ? (calculatedAmount | number:'1.0-0') : ''"
                readonly>

              <input
                type="text"
                placeholder="Stock"
                [value]="selectedProductStock"
                readonly>

            </div>

          </div>

          <div class="pi-add-action">

            <button
              type="button"
              class="pi-add-btn"
              (click)="addItem()"
              [disabled]="isViewMode">

              Add

            </button>

          </div>

        </div>

      </div>


      <!-- CENTER COLUMN -->
      <div class="pi-col pi-center">

        <div class="pi-center-stack">

          <div class="pi-box">

            <div class="pi-box-title">
              Order Summary
            </div>

            <div class="pi-summary-row">
              <label>Order Value</label>

              <input
                type="text"
                class="txt-right"
                [value]="order.orderValue ? (order.orderValue | number:'1.0-0') : ''"
                readonly>
            </div>

          </div>


          <div class="pi-box pi-cart">

            <div class="pi-box-title">
              Product Cart
            </div>

            <div class="pi-cart-table-wrapper">
              <!-- table stays exactly as you wrote it -->
            </div>

          </div>


          <div class="pi-box pi-notes-box">

            <div class="pi-box-title">
              Notes / Remarks
            </div>

            <textarea
              class="pi-notes"
              [(ngModel)]="order.notes"
              [disabled]="isViewMode">
            </textarea>

          </div>

        </div>

      </div>



      <!-- RIGHT COLUMN -->
      <div class="pi-col pi-right">

        <div class="pi-shelf">

          <div class="pi-shelf-header">

            <div class="pi-shelf-title">
              Product Shelf
            </div>

            <div class="pi-shelf-search">

              <span class="pi-search-icon">
                <i class="fa-solid fa-magnifying-glass"></i>
              </span>

              <input
                type="text"
                placeholder="Search product..."
                [(ngModel)]="shelfSearch"
                [disabled]="isViewMode">

            </div>

          </div>


          <div class="pi-shelf-list">

            <div
              class="pi-product-card"
              *ngFor="let p of filteredShelfProducts"
              (click)="!isViewMode && selectProductFromShelf(p)">

              <div class="pi-product-name">
                {{ p.productName }}
              </div>

              <div class="pi-product-stock">
                Stock: {{ p.currentStock || 0 }}
              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
